name: "Roast My Codebase"
description: "Analyze your codebase health and post a roast comment on every PR 🔥"
author: "rahuldk1105"

branding:
  icon: "zap"
  color: "orange"

inputs:
  github-token:
    description: "GitHub token for posting PR comments. Pass secrets.GITHUB_TOKEN."
    required: true
  path:
    description: "Path to the codebase to scan. Defaults to repo root."
    required: false
    default: "."
  fail-below:
    description: "Fail the workflow if health score is below this value (0–100). Leave empty to never fail."
    required: false
    default: ""
  ai-roasts:
    description: "Enable AI-powered roasts (requires anthropic-api-key)."
    required: false
    default: "false"
  anthropic-api-key:
    description: "Anthropic API key. Only needed when ai-roasts is true."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install roast-my-codebase
      shell: bash
      run: npm install -g roast-my-codebase@latest

    - name: Roast and post PR comment
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
      run: |
        ARGS="${{ inputs.path }} --pr-comment --json"
        if [ "${{ inputs.ai-roasts }}" = "true" ] && [ -n "${{ inputs.anthropic-api-key }}" ]; then
          ARGS="$ARGS --ai-roasts"
        fi
        roast-my-codebase $ARGS | tee /tmp/roast-report.json

    - name: Check score threshold
      if: inputs.fail-below != ''
      shell: bash
      run: |
        SCORE=$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('/tmp/roast-report.json','utf8')); console.log(r.health.score);")
        THRESHOLD="${{ inputs.fail-below }}"
        echo "Health score: $SCORE / Threshold: $THRESHOLD"
        if [ "$SCORE" -lt "$THRESHOLD" ]; then
          echo "::error::Health score $SCORE is below the required threshold of $THRESHOLD"
          exit 1
        fi
